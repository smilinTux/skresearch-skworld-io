<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#ffa500" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffa500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="84%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffa500"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle lattice motif (top-right) -->
  <g stroke="#22d3ee" stroke-opacity="0.16" stroke-width="1.5" fill="none">
    <path d="M820,70 L920,70 L1020,70 L1120,70 M820,150 L920,150 L1020,150 L1120,150 M820,230 L920,230 L1020,230 L1120,230"/>
    <path d="M820,70 L820,150 L820,230 M920,70 L920,150 L920,230 M1020,70 L1020,150 L1020,230 M1120,70 L1120,150 L1120,230"/>
    <path d="M820,70 L920,150 L1020,230 M920,70 L1020,150 L1120,230 M1020,70 L1120,150 M820,150 L920,230"/>
  </g>
  <g fill="#22d3ee" fill-opacity="0.5">
    <circle cx="820" cy="70" r="4"/><circle cx="920" cy="70" r="4"/><circle cx="1020" cy="70" r="4"/><circle cx="1120" cy="70" r="4"/>
    <circle cx="820" cy="150" r="4"/><circle cx="920" cy="150" r="4"/><circle cx="1020" cy="150" r="4"/><circle cx="1120" cy="150" r="4"/>
    <circle cx="820" cy="230" r="4"/><circle cx="920" cy="230" r="4"/><circle cx="1020" cy="230" r="4"/><circle cx="1120" cy="230" r="4"/>
  </g>

  <!-- border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="22" fill="none" stroke="#ffa500" stroke-opacity="0.18" stroke-width="2"/>

  <!-- top brand row -->
  <circle cx="92" cy="100" r="13" fill="none" stroke="#ffd700" stroke-width="3"/>
  <line x1="101" y1="109" x2="112" y2="120" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <text x="124" y="110" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="30" fill="#ffd700" font-weight="700">SKResearch ⚛️</text>
  <text x="80" y="146" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="20" fill="#22d3ee" letter-spacing="3">SKWORLD · SOVEREIGN AI · POST-QUANTUM</text>

  <!-- title -->
  <text x="80" y="278" font-family="'Inter','DejaVu Sans',sans-serif" font-size="78" font-weight="700" fill="url(#title)">Built to Outlive</text>
  <text x="80" y="364" font-family="'Inter','DejaVu Sans',sans-serif" font-size="78" font-weight="700" fill="url(#title)">the Algorithm</text>
  <text x="80" y="414" font-family="'Inter','DejaVu Sans',sans-serif" font-size="27" font-style="italic" fill="rgba(255,255,255,0.55)">Hybrid Post-Quantum Cryptography &amp; Crypto-Agility · skpqc · skchat · skcomms</text>

  <!-- hook chip -->
