<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#ffa500" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffa500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="82%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#7b68ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7b68ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffa500"/>
      <stop offset="45%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#7b68ee"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="22" fill="none" stroke="#ffa500" stroke-opacity="0.18" stroke-width="2"/>

  <!-- top brand row -->
  <circle cx="92" cy="100" r="13" fill="none" stroke="#ffd700" stroke-width="3"/>
  <line x1="101" y1="109" x2="112" y2="120" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
  <text x="124" y="110" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="30" fill="#ffd700" font-weight="700">SKResearch</text>
  <text x="80" y="146" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="20" fill="#7b68ee" letter-spacing="3">SKWORLD · SOVEREIGN AI · EMPIRICAL</text>

  <!-- title -->
  <text x="80" y="262" font-family="'Inter','DejaVu Sans',sans-serif" font-size="74" font-weight="700" fill="url(#title)">The Liberated Language</text>
  <text x="80" y="346" font-family="'Inter','DejaVu Sans',sans-serif" font-size="74" font-weight="700" fill="url(#title)">That Wasn't</text>
  <text x="80" y="396" font-family="'Inter','DejaVu Sans',sans-serif" font-size="30" font-style="italic" fill="rgba(255,255,255,0.55)">…and the one that was. Measuring AI-to-AI language on real tokenizers.</text>

  <!-- hook chip -->
  <rect x="80" y="450" width="700" height="64" rx="32" fill="#ffa500" fill-opacity="0.10" stroke="#ffa500" stroke-opacity="0.4" stroke-width="2"/>
  <text x="110" y="491" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="27" fill="#ffa500" font-weight="700">-67% tokens, 100% fidelity</text>
  <text x="525" y="491" font-family="'Inter','DejaVu Sans',sans-serif" font-size="24" fill="rgba(255,255,255,0.65)">the one trick that works</text>

  <!-- footer line -->
  <text x="80" y="566" font-family="'Inter','DejaVu Sans',sans-serif" font-size="22" fill="rgba(255,255,255,0.45)">Chef (David) &amp; Lumina · wire density is not token density · skresearch.skworld.io</text>
</svg>
